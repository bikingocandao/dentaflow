# ═══════════════════════════════════════════════
#  🚀 PLAN DE DESPLIEGUE EN RENDER (BLUEPRINT)
# ═══════════════════════════════════════════════
#
# Para desplegar con un solo clic, ve a tu panel de Render,
# crea un nuevo "Blueprint" y conecta tu repositorio de GitHub.

services:
  - type: web
    name: dentaflow
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: PLAN_ACTIVO
        value: completo
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: ADMIN_USERNAME
        value: carlos luis
      - key: ADMIN_PASSWORD
        value: "123456"
      - key: JWT_SECRET
        value: dentaflow-secret-key-9988
      - key: GROQ_API_KEY
        sync: false # Ya configurada en el dashboard de Render
      - key: OWNER_PHONE
        sync: false # Número del dueño del negocio para notificaciones (ej: 18095551234)
      # ─── Base de datos en la nube (Supabase) — guarda citas, pacientes, pagos, etc. ───
      - key: SUPABASE_URL
        value: https://zajphxjmohccdkkbkmvk.supabase.co
      - key: SUPABASE_KEY
        sync: false # Pega aquí (en el panel de Render) la misma llave del archivo .env

    # ⚠️ PERSISTENCIA DE DATOS (OPCIONAL - PLAN DE PAGO)
    #
    # El plan gratuito de Render borra los datos locales (sesión de WhatsApp y citas) al reiniciar.
    # Si actualizas a un plan de pago, puedes descomentar la sección de disco a continuación para 
    # activar la persistencia ilimitada de datos.
    #
    #   - key: DATA_DIR
    #     value: /var/data/data
    #   - key: AUTH_DIR
    #     value: /var/data/auth_info
    #
    # disk:
    #   name: dentaflow-storage
    #   mountPath: /var/data
    #   sizeGB: 1
