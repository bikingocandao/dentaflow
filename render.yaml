# ═══════════════════════════════════════════════
#  🚀 PLAN DE DESPLIEGUE EN RENDER (BLUEPRINT)
# ═══════════════════════════════════════════════
#
# Para desplegar con un solo clic, ve a tu panel de Render,
# crea un nuevo "Blueprint" y conecta tu repositorio de GitHub.

services:
  - type: web
    name: dentaflow
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: PLAN_ACTIVO
        value: completo
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: ADMIN_USERNAME
        value: carlos luis
      - key: ADMIN_PASSWORD
        value: "1213686"
      - key: JWT_SECRET
        value: dentaflow-secret-key-9988
      - key: GROQ_API_KEY
        sync: false # Ya configurada en el dashboard de Render
      - key: OWNER_PHONE
        sync: false # Número del dueño del negocio para notificaciones (ej: 18095551234)
      # ─── Base de datos en la nube (Supabase) — guarda citas, pacientes, pagos, etc. ───
      - key: SUPABASE_URL
        value: https://zajphxjmohccdkkbkmvk.supabase.co
      - key: SUPABASE_KEY
        sync: false # Pega aquí (en el panel de Render) la misma llave del archivo .env
      # ─── Persistencia en disco: conserva la SESIÓN de WhatsApp y datos locales ───
      - key: DATA_DIR
        value: /var/data/data
      - key: AUTH_DIR
        value: /var/data/auth_info

    # 💾 Disco permanente (plan de pago) — la sesión de WhatsApp NO se pierde al reiniciar
    disk:
      name: dentaflow-storage
      mountPath: /var/data
      sizeGB: 1
